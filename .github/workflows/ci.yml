name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.10, 3.9]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Syntax check (compile)
        run: python -m py_compile app.py

      - name: Import module smoke test
        run: python -c "import importlib; importlib.import_module('app'); print('import OK')"

      - name: Run tests with pytest
        run: |
          if [ -f tests ]; then
            pytest -q || true
          else
            echo 'no tests directory, skipping pytest'
          fi

      - name: Optional: Run flake8 if installed
        run: |
          if command -v flake8 >/dev/null 2>&1; then
            flake8 --max-line-length=120 . || true
          else
            echo 'flake8 not installed, skipping'
          fi
